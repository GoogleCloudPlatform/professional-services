name: "generic_extensibility_demo"
agent:
  # Load custom tools from local Python files
  custom_tools:
    - "examples/custom_hooks_demo/custom_tools.py:calculate_shipping_tax"
  
  system_prompt: |
    {{DEFAULT}}
    
    You have a custom tool called 'calculate_shipping_tax'. 
    If you need to calculate shipping tax for a zip code, use this tool.
    
    Start by navigating to https://www.google.com and searching for "shipping tax calculator" to see what comes up, then use the tool for zip code 90210 with an order of $100.

task:
  start_url: "https://www.google.com"
  goal: "Navigate to Google, search for a shipping tax calculator, and then use your custom tool to calculate tax for zip code 90210 with an order of $100."

environment:
  type: "browser"

hooks:
  before_run: "examples/custom_hooks_demo/hooks.py:log_start"
  after_step: "examples/custom_hooks_demo/hooks.py:validate_navigation"

criteria:
  - "Agent navigates to Google."
  - "Agent calls calculate_shipping_tax with correct parameters."
