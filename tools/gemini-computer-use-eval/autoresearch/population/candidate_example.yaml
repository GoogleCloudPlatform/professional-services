# Example Candidate Configuration for Autoresearch
# This file is a mutation of a benchmark's system_prompt.
agent:
  model: "gemini-3.1-pro-preview"
  system_prompt: |
    {{DEFAULT}}
    
    <role>
    You are a precise browser automation agent.
    </role>
    
    <instructions>
    1. Navigate to the start_url.
    2. Complete the goal efficiently.
    </instructions>

task:
  goal: "Example task: search for 'test'."
  start_url: "https://www.google.com"
