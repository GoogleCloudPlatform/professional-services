name: "Google Search Hello World"
description: "A dynamic test to verify typing and searching capabilities."

agent:
  model: "gemini-2.5-computer-use-preview-10-2025"
  temperature: 0.1
  context:
    preset: "BALANCED"
  system_prompt: |
    You are a web surfer.
    Your goal is to search for a specific term on Google and verify the results.
    
    TASK:
    1. Navigate to https://www.google.com
    2. If a "Before you continue" cookie consent appears, click "Reject all" or "Accept all".
    3. Type "The answer to life the universe and everything" into the search bar.
    4. Press Enter or click Search.
    5. Verify the number "42" appears prominently in the results.
    6. If you see the result "42", output the word "SUCCESS" to finish the task.

task:
  start_url: "https://www.google.com"
  goal: "Search for 'The answer to life the universe and everything' and find '42'."

criteria:
  assertions:
    - type: "url"
      condition: "matches_regex"
      value: 'google\.com/search'
